version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omnipotent_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-omnipotent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-omnipotent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnipotent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnipotent_network

  redis:
    image: redis:7-alpine
    container_name: omnipotent_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnipotent_network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omnipotent_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-omnipotent}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      DB_NAME: ${DB_NAME:-omnipotent_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REACT_APP_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - omnipotent_network
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: omnipotent_frontend
    environment:
      REACT_APP_API_URL: http://localhost:3000
    ports:
      - "80:3001"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - omnipotent_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  omnipotent_network:
    driver: bridge
